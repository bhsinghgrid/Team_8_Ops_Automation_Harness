version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - CACHE_BUSTER
    container_name: magellan-app
    ports:
      - "8000:8000"
    volumes:
      # Mount the .env file for configuration
      - ./.env:/app/.env
      # Mount the gcloud config directory for authentication.
      # IMPORTANT: This assumes the user running docker has gcloud configured at ~/.config/gcloud
      - ~/.config/gcloud:/root/.config/gcloud
      # Mount the shadow_agent project for editable installation
      - ${SHADOW_AGENT_DIR:-./shadow_agent}:/app/shadow_agent_repo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - mongo
      - redis
    environment:
      # This allows the container to connect to the Temporal server running on the host machine.
      TEMPORAL_ADDRESS: "host.docker.internal:7233"
      PYTHONPATH: "/app/shadow_agent_repo/src/shadow_agent_framework:/app"
    # This allows the container to resolve host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: magellan-frontend
    ports:
      - "5173:80"

  diffy:
    platform: linux/amd64
    image: diffy/diffy
    container_name: diffy
    ports:
      - "8888:8888" # API Port
      - "8880:8880" # UI/Dashboard Port
      - "8881:8881" # Admin Port
    depends_on:
      app:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - "diffy.master.primary=http://app:8000"
      - "diffy.master.secondary=http://app:8000"
      - "diffy.master.candidate=http://app:8000"
      - "spring.data.mongodb.uri=mongodb://mongo:27017/diffy"
      - "spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.embedded.EmbeddedMongoAutoConfiguration"
      - "redis.host=redis"
      - OTEL_SDK_DISABLED=true
    volumes:
      - ./diffy/diffy.properties:/app/diffy.properties

  mongo:
    image: mongo:4.4
    container_name: diffy-mongo
    ports:
      - "27017:27017"
    volumes:
      - diffy-mongo-data:/data/db

  redis:
    image: redis:7
    container_name: diffy-redis
    ports:
      - "6379:6379"

volumes:
  diffy-mongo-data:
